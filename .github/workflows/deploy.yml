name: Deploy with password protection

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Encrypt with Staticrypt
        run: |
          npx staticrypt@3 index.html \
            --password "${{ secrets.SITE_PASSWORD }}" \
            --directory dist \
            --short \
            --template-title "cashtime CRM" \
            --template-instructions "Введіть пароль для доступу"

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
